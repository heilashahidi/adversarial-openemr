name: Nightly Regression Replay

# Replays every confirmed exploit against the live target on a schedule and
# commits the resulting JSON back to main so the dashboard reflects fresh
# pass/fail/inconclusive verdicts every day. Closes the "no continuous-
# execution scheduler" gap (req #6 in the audit).

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily ≈ midnight PT
  workflow_dispatch: {}    # also runnable on-demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: regression-nightly
  cancel-in-progress: false

jobs:
  regress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        # No --no-cache-dir — the setup-python cache action above saves the
        # pip download cache between runs, so subsequent invocations skip
        # re-downloading wheels. The Post-step failure mode that drops the
        # cache is mutually exclusive with --no-cache-dir.
        run: pip install -r requirements.txt

      - name: Backfill state.db from canonical result JSONs
        # state.db is gitignored, so CI starts with an empty store. The
        # backfill script walks every committed result JSON and rebuilds
        # the findings + exploits tables (~84 confirmed exploits as of today).
        run: python3 scripts/backfill_state_from_results.py

      - name: Run regression harness
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          TS=$(date -u +%Y%m%d_%H%M%S)
          python3 agents/regression_harness.py \
            --save evals/results/regression_nightly_${TS}.json

      - name: Notify Slack on failure
        # Fires only if a previous step failed. Skipped silently if
        # SLACK_WEBHOOK_URL secret is absent (no-config fallback).
        # GitHub's built-in email-on-failure can be enabled at
        # github.com/settings/notifications without any secret.
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\": \"🚨 *Nightly Regression failed* on \`${GITHUB_REF#refs/heads/}\` @ \`${GITHUB_SHA:0:7}\`\\n<https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View run> · This usually means a previously-fixed exploit has regressed.\"}" \
            "$SLACK_WEBHOOK_URL" || echo "Slack notify failed (non-fatal)"

      - name: Commit and push regression artifact
        # Concurrent workflow runs (campaign + regression at the same time)
        # can race on `main`. The concurrency group serializes WITHIN this
        # workflow but not across workflows — so we fetch + rebase before
        # push, with up to 3 retries. The artifact is a new file in
        # evals/results/ so the rebase is a clean fast-forward; we never
        # touch shared paths.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "regression-bot"
          git config user.email "actions@github.com"
          git add evals/results/regression_nightly_*.json || true
          if git diff --cached --quiet; then
            echo "No new regression artifact to commit."
            exit 0
          fi
          git commit -m "Nightly regression replay $(date -u +%Y-%m-%d) [skip ci]"
          for attempt in 1 2 3; do
            if git push 2>&1; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt rejected — rebasing on origin/main and retrying."
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts."
          exit 1
